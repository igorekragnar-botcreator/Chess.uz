<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="description" content="Chess.uz — шахматы с сильным AI, онлайн-игра, блиц, статистика">
  <meta name="theme-color" content="#080503">
  <title>♟ Chess.uz — Шахматы онлайн</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="logo"><span>♟</span> Chess.uz</div>
    <nav class="nav-links">
      <a href="#game">Игра</a>
      <a href="https://lichess.org" target="_blank" rel="noopener">Lichess</a>
      <a href="#" id="authLink">🔐 Войти</a>
    </nav>
  </header>

  <div class="page-wrap">
    <div id="game" class="app">

      <!-- Карточки игроков -->
      <div class="pcard" id="cardTop">
        <div class="pavatar" id="avatTop">♚</div>
        <div class="pmid">
          <div class="pname" id="nameTop">Чёрные</div>
          <div class="pcaps" id="capsTop"></div>
        </div>
        <div class="pright">
          <div class="ptimer" id="tmTop">10:00</div>
          <div class="padv" id="advTop"></div>
        </div>
      </div>

      <!-- Доска -->
      <div class="board-area">
        <div class="board-wrap">
          <div class="rank-col" id="rankCol"></div>
          <div class="board-col">
            <canvas id="cv" width="480" height="480"></canvas>
            <div class="file-row" id="fileRow"></div>
          </div>
        </div>
        <div class="evalbar"><div class="evalfill" id="evalFill"></div></div>
        <div class="promo-overlay" id="promoOvl">
          <div class="promo-title">Выбери фигуру</div>
          <div class="promo-row" id="promoRow"></div>
        </div>
      </div>

      <div class="status" id="statusEl">Белые начинают</div>
      <div class="aibar" id="aiBar">🤖 AI анализирует...</div>

      <div class="pcard" id="cardBot">
        <div class="pavatar" id="avatBot">♔</div>
        <div class="pmid">
          <div class="pname" id="nameBot">Белые</div>
          <div class="pcaps" id="capsBot"></div>
        </div>
        <div class="pright">
          <div class="ptimer" id="tmBot">10:00</div>
          <div class="padv" id="advBot"></div>
        </div>
      </div>

      <!-- Управление -->
      <div class="ctrl">
        <div class="btn-row">
          <button class="pill on" id="btn2p">👥 2 игрока</button>
          <button class="pill" id="btnAi">🤖 Против AI</button>
          <button class="pill act" id="btnNew">♻ Новая</button>
          <button class="pill flip" id="btnFlip">⇅ Flip</button>
          <button class="pill" id="btnTheme">🌓 Тема</button>
        </div>
        <div class="time-row" id="timeRow" style="display:flex; gap:6px; justify-content:center; margin-top:5px;">
          <button class="time-btn" data-time="10min">10 мин</button>
          <button class="time-btn" data-time="5+0">5+0</button>
          <button class="time-btn" data-time="3+2">3+2</button>
        </div>
        <div class="diff-row" id="diffRow" style="display:none">
          <button class="diff" data-d="0">🌿 Лёгкий</button>
          <button class="diff" data-d="1">🌀 Норм</button>
          <button class="diff" data-d="2">⚡ Тяжёлый</button>
          <button class="diff" data-d="3">🔥 Эксперт</button>
          <button class="diff" data-d="4">👑 Мастер</button>
          <button class="diff on" data-d="5">✨ Гроссмейстер</button>
          <button class="diff" data-d="6">🤖 Бог</button>
        </div>
      </div>

      <!-- Дебютный детектор -->
      <div id="openingPanel" style="display:none;background:var(--card);border:1px solid var(--gold3);border-radius:50px;padding:7px 18px;text-align:center;">
        <span style="font-size:.62rem;color:var(--dim);letter-spacing:1px;">ДЕБЮТ</span>
        <span style="font-size:.78rem;color:var(--gold2);font-weight:700;margin-left:8px;" id="openingName"></span>
      </div>

      <!-- История ходов -->
      <div class="hist">
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;">
          <div class="hist-title">📜 История</div>
          <button id="btnCopy" class="pill small">📋 Копировать</button>
          <button id="btnExportPGN" class="pill small">📁 PGN</button>
        </div>
        <div class="hist-scroll" id="histScroll">
          <span class="hist-empty">— нет ходов —</span>
        </div>
      </div>

      <!-- Статистика -->
      <div id="statsPanel" style="background:var(--card);border-radius:40px;padding:6px;margin-top:5px;text-align:center;font-size:0.7rem;">
        <span id="statsText">🏆 0 / ❌ 0 / 🤝 0</span>
      </div>

    </div> <!-- .app -->

    <footer class="site-footer">
      <p>♟ Chess.uz · с любовью к шахматам</p>
    </footer>
  </div>

  <!-- Модальное окно для авторизации (простая имитация) -->
  <div id="authModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000;">
    <div style="background:var(--card); padding:20px; border-radius:20px; text-align:center; width:260px;">
      <h3 style="color:var(--gold);">Вход в Chess.uz</h3>
      <input type="text" id="loginUsername" placeholder="Имя" style="width:100%; margin:8px 0; padding:6px; background:var(--faint); border:1px solid var(--border); color:var(--text); border-radius:40px;">
      <input type="password" id="loginPassword" placeholder="Пароль" style="width:100%; margin:8px 0; padding:6px; background:var(--faint); border:1px solid var(--border); color:var(--text); border-radius:40px;">
      <button id="doLogin" class="pill" style="margin:4px;">Войти</button>
      <button id="closeModal" class="pill">Отмена</button>
      <p style="font-size:0.6rem; margin-top:8px;">(пароль любой, для демо)</p>
    </div>
  </div>

  <script src="chess.js"></script>
</body>
</html>
